  <style>
    .report-cat-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--n-700);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .15s;
    }

    .report-cat-item:hover {
      background: var(--n-50);
    }

    .report-cat-item.active {
      background: var(--navy-50);
      color: var(--navy-700);
      border-left-color: var(--navy-700);
    }

    .summary-cards {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .summary-card {
      flex: 1;
      min-width: 150px;
      background: #fff;
      border: 1px solid #eef0f3;
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .04);
    }

    .summary-card .sc-label {
      font-size: 11px;
      color: #9aa4b2;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 4px;
    }

    .summary-card .sc-value {
      font-size: 17px;
      font-weight: 700;
      color: #1e2a3a;
    }

    .summary-card.accent-orange .sc-value {
      color: #d97706;
    }

    .summary-card.accent-red .sc-value {
      color: #dc2626;
    }

    .summary-card.accent-navy .sc-value {
      color: var(--navy-700, #0d3b66);
    }

    .summary-card.accent-green .sc-value {
      color: #16a34a;
    }

    .state-panel {
      text-align: center;
      padding: 52px 20px;
      color: #9aa4b2;
    }

    .state-panel i {
      font-size: 2.8rem;
      display: block;
      margin-bottom: 12px;
    }

    .state-panel p {
      font-size: 14px;
      margin: 0;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spin {
      display: inline-block;
      animation: spin .8s linear infinite;
    }

    .table-jlms-wrap {
      overflow-x: auto;
    }

    .table-jlms {
      min-width: 760px;
    }

    .nowrap {
      white-space: nowrap;
    }

    .badge-jlms {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11.5px;
      font-weight: 700;
    }

    .badge-jlms .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .badge-success {
      background: #ecfdf3;
      color: #16a34a;
    }

    .badge-neutral {
      background: #f1f3f5;
      color: #6b7280;
    }

    .badge-warning {
      background: #fffbeb;
      color: #d97706;
    }

    .badge-danger {
      background: #fef2f2;
      color: #dc2626;
    }

    .suggestion-list {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  z-index: 50;
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  box-shadow: 0 4px 12px rgba(0,0,0,.08);
  max-height: 220px;
  overflow-y: auto;
  display: none;
  margin-top: 2px;
}
.suggestion-item {
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
}
.suggestion-item:hover {
  background: var(--n-50, #f5f7fa);
}
.suggestion-item small {
  color: #9aa4b2;
  display: block;
  font-size: 11px;
}
  </style>

  <script>
    jlmsInitShell();

    let currentPage = 1;
    const PAGE_SIZE = 5;
    let lastResult = null;
    let activeFilters = {};
    // loadReport(activeFilters);

    const el = (id) => document.getElementById(id);

    (function () {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      const today = `${y}-${m}-${d}`;
      el("fFromDate").value = today;
      el("fToDate").value = today;
    })();
    const elTBody = el("tableBody"), elTFoot = el("tableFoot"), elBadge = el("recordsBadge"),
      elSummary = el("summaryCards"), elPaginFoot = el("paginationFooter"),
      elPaginInfo = el("paginationInfo"), elPaginCtrls = el("paginationControls");

    function fmt(n) { return n == null ? "—" : "₹" + Number(n).toLocaleString("en-IN", { maximumFractionDigits: 0 }); }
    function fmtNum(n) { return n == null ? "—" : Number(n).toLocaleString("en-IN", { maximumFractionDigits: 2 }); }
    function fmtDate(dt) {
      if (!dt) return "—";
      return new Date(dt).toLocaleDateString("en-GB", { day: "2-digit", month: "2-digit", year: "numeric" });
    }
    // function statusBadge(status, days) {
    //   let cls = "badge-success", label = status;
    //   if (status === "Overdue") { cls = "badge-danger"; label = days > 0 ? `Overdue (${days}d)` : "Overdue"; }
    //   else if (status === "Due") { cls = "badge-warning"; }
    //   return `<span class="badge-jlms ${cls}"><span class="dot"></span>${label}</span>`;
    // }
    function statusBadge(status, days) {
      let cls = "badge-success", label = status;
      if (status === "Overdue") { cls = "badge-danger"; label = days > 0 ? `Overdue (${days}d)` : "Overdue"; }
      else if (status === "Due") { cls = "badge-warning"; }
      else if (status === "Closed") { cls = "badge-danger"; }
      return `<span class="badge-jlms ${cls}"><span class="dot"></span>${label}</span>`;
    }
    function setExportBtnsVisible(v) {
      ["btnExportExcel", "btnPrint"].forEach(id => document.getElementById(id).style.display = v ? "" : "none");
    }

    async function loadDropdowns() {
      try {
        const schemes = await Api.getLoanSchemes(true);
        el("fScheme").innerHTML = `<option value="">All Schemes</option>` +
          schemes.map(s => `<option value="${s.loanSchemeId}">${s.schemeName}</option>`).join("");
      } catch { }
      try {
        const types = await Api.getJewelTypes(true);
        el("fJewelType").innerHTML = `<option value="">All Types</option>` +
          types.map(t => `<option value="${t.jewelTypeId}">${t.jewelTypeName}</option>`).join("");
      } catch { }
      try {
        const branches = await Api.getBranches();
        const user = Session.get();
        // All users are scoped to their branch — lock the dropdown for everyone
        const userBranch = user && branches.find(b => b.branchId === user.branchId);
        if (userBranch) {
          el("fBranch").innerHTML = `<option value="${userBranch.branchId}">${userBranch.branchName}</option>`;
          el("fBranch").disabled = true;
        } else {
          el("fBranch").innerHTML = `<option value="">All Branches</option>` +
            branches.map(b => `<option value="${b.branchId}">${b.branchName}</option>`).join("");
        }
      } catch { /* branches endpoint not available — filter silently disabled */ }
    }

    async function loadReport(filters) {
      clearApiError();
      const params = { ...(filters || {}), page: currentPage, pageSize: PAGE_SIZE };
      elTBody.innerHTML = `<tr><td colspan="7"><div class="state-panel"><i class="bi bi-arrow-repeat spin"></i><p>Loading…</p></div></td></tr>`;
      elTFoot.style.display = "none"; elPaginFoot.style.display = "none";
      elBadge.style.display = "none"; elSummary.style.display = "none";
      setExportBtnsVisible(false);

      try {
        const data = await Api.getActiveLoansReport(params);
        lastResult = data;
        renderGrid(data);
      } catch (err) {
        showApiError(err);
        elTBody.innerHTML = `<tr><td colspan="7"><div class="state-panel"><i class="bi bi-exclamation-triangle" style="color:#dc2626;font-size:2.8rem;"></i><p>Failed to load report. Check that the API is running.</p></div></td></tr>`;
      }
    }

    el("btnApplyFilters").addEventListener("click", () => {
      currentPage = 1;
      activeFilters = {
        loanNo: el("fLoanNo").value.trim() || undefined,
        customerName: el("fCustomerName").value.trim() || undefined,
        // mobile: el("fMobile").value.trim() || undefined,
        // aadhaar:      el("fAadhaar").value.trim()      || undefined,
        // loanSchemeId: el("fScheme").value || undefined,
        // jewelTypeId: el("fJewelType").value || undefined,
        fromDate: el("fFromDate").value || undefined,
        toDate: el("fToDate").value || undefined,
        // branchId:     el("fBranch").value              || undefined,
        status: el("fStatus").value || undefined
      };
      loadReport(activeFilters);
    });
function debounce(fn, delay) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), delay);
  };
}

function setupAutocomplete({ inputId, boxId, fetchFn, renderItem, onSelect }) {
  const input = el(inputId);
  const box = el(boxId);

  const doSearch = debounce(async () => {
    const q = input.value.trim();
    if (q.length < 2) { box.style.display = "none"; box.innerHTML = ""; return; }
    try {
      const results = await fetchFn(q);
      if (!results || results.length === 0) { box.style.display = "none"; box.innerHTML = ""; return; }
      box.innerHTML = results.map((r, i) => `<div class="suggestion-item" data-idx="${i}">${renderItem(r)}</div>`).join("");
      box.style.display = "block";
      box.querySelectorAll(".suggestion-item").forEach((node, i) => {
        node.addEventListener("click", () => {
          onSelect(results[i]);
          box.style.display = "none";
        });
      });
    } catch {
      box.style.display = "none";
    }
  }, 300);

  input.addEventListener("input", doSearch);
  document.addEventListener("click", (e) => {
    if (!input.contains(e.target) && !box.contains(e.target)) box.style.display = "none";
  });
}
setupAutocomplete({
  inputId: "fCustomerName",
  boxId: "customerSuggestions",
  fetchFn: (q) => Api.searchCustomersForActiveReport(q),
  renderItem: (c) => `${c.customerName}<small>${c.customerCode} · ${c.mobile}</small>`,
  onSelect: (c) => { el("fCustomerName").value = c.customerName; }
});

setupAutocomplete({
  inputId: "fLoanNo",
  boxId: "loanNoSuggestions",
  fetchFn: (q) => Api.searchLoansForActiveReport(q),
  renderItem: (l) => l.loanNumber,
  onSelect: (l) => { el("fLoanNo").value = l.loanNumber; }
});
    function renderGrid(data) {
      const { items, totalCount, page, pageSize,
        totalQuantity, totalWeight, totalLoanAmount } = data;

      el("scTotalQty").textContent = (totalQuantity || 0).toLocaleString("en-IN");
      el("scTotalWeight").textContent = fmtNum(totalWeight) + " g";
      el("scTotalLoanAmt").textContent = fmt(totalLoanAmount);
      elSummary.style.display = "flex";

      elBadge.textContent = `${totalCount.toLocaleString("en-IN")} records`;
      elBadge.style.display = "";
      setExportBtnsVisible(totalCount > 0);

      if (!items || items.length === 0) {
        elTBody.innerHTML = `<tr><td colspan="7"><div class="state-panel"><i class="bi bi-inbox"></i><p>No  loans found for the selected filters.</p></div></td></tr>`;
        elTFoot.style.display = "none"; elPaginFoot.style.display = "none";
        return;
      }

      let pLoanAmt = 0, pIntAmt = 0, pTot = 0;
      const startNo = (page - 1) * pageSize + 1;
      const rows = items.map((r, i) => {
        pLoanAmt += r.principalAmount || 0;
        pIntAmt += r.overallInterest || 0;
        pTot += r.totalOutstanding || 0;
        return `<tr>
    <td>${startNo + i}</td>
    <td class="nowrap" title="Maturity: ${fmtDate(r.maturityDate)}">${r.loanNumber}</td>
    <td>${fmtDate(r.loanDate)}</td>
    <td data-export="${r.customerName} (${r.customerCode})">${r.customerName}<br><small style="color:#9aa4b2;font-size:0.78em;">${r.customerCode}</small></td>
    <td class="text-end">${fmt(r.principalAmount)}</td>
    <td class="text-end">${fmt(r.overallInterest)}</td>
    <td class="text-end cell-strong">${fmt(r.totalOutstanding)}</td>
    <td>${statusBadge(r.status, r.daysOverdue)}</td>
  </tr>`;
      });

      elTBody.innerHTML = rows.join("");
      el("footOverallInterest").textContent = fmt(pLoanAmt);   // sits under "Loan Amt" column
      el("footOutInterest").textContent = fmt(pIntAmt);     // sits under "Int Amount" column
      el("footTotalOutstanding").textContent = fmt(pTot);        // sits under "Bal Amt" column
      elTFoot.style.display = "";

      renderPagination(totalCount, page, pageSize);
    }

    function renderPagination(totalCount, page, pageSize) {
      const totalPages = Math.ceil(totalCount / pageSize);
      const from = (page - 1) * pageSize + 1, to = Math.min(page * pageSize, totalCount);
      elPaginInfo.textContent = `Showing ${from}–${to} of ${totalCount.toLocaleString("en-IN")}`;

      let html = `<div class="page-btn${page === 1 ? " disabled" : ""}" onclick="goPage(${page - 1})"><i class="bi bi-chevron-left"></i></div>`;
      let sp = Math.max(1, page - 2), ep = Math.min(totalPages, sp + 4);
      if (ep - sp < 4) sp = Math.max(1, ep - 4);
      for (let p = sp; p <= ep; p++) html += `<div class="page-btn${p === page ? " active" : ""}" onclick="goPage(${p})">${p}</div>`;
      html += `<div class="page-btn${page === totalPages ? " disabled" : ""}" onclick="goPage(${page + 1})"><i class="bi bi-chevron-right"></i></div>`;
      elPaginCtrls.innerHTML = html;
      elPaginFoot.style.display = "";
    }

    function goPage(p) {
      if (p < 1 || !lastResult) return;
      if (p > Math.ceil(lastResult.totalCount / PAGE_SIZE)) return;
      currentPage = p;
      loadReport(activeFilters);
    }
    function exportExcel() {
      if (!lastResult || !lastResult.items || lastResult.items.length === 0) return;

      const header = ["S.No", "Loan No", "Loan Date", "Customer", "Loan Amt", "Int Amount", "Bal Amt", "Status"];

      const startNo = (lastResult.page - 1) * lastResult.pageSize + 1;
      const rows = lastResult.items.map((r, i) => [
        startNo + i,
        r.loanNumber,
        fmtDate(r.loanDate),
        `${r.customerName} (${r.customerCode})`,
        r.principalAmount || 0,
        r.overallInterest || 0,
        r.totalOutstanding || 0,
        r.status
      ]);

      const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);

      // Currency columns: Loan Amt(E), Int Amount(F), Bal Amt(G)
      const currencyFmt = '₹#,##,##0';
      ["E", "F", "G"].forEach(col => {
        for (let r = 2; r <= rows.length + 1; r++) {
          const cell = ws[`${col}${r}`];
          if (cell) cell.z = currencyFmt;
        }
      });

      ws["!cols"] = [
        { wch: 6 }, { wch: 16 }, { wch: 12 }, { wch: 26 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 12 }
      ];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Loan Report");
      XLSX.writeFile(wb, `Loan_Report_${new Date().toISOString().slice(0, 10)}.xlsx`);
    }

    function printReport() {
      const tbl = document.getElementById("reportTable").outerHTML;
      const win = window.open("", "_blank");
      win.document.write(`<!DOCTYPE html><html><head><title>Loan Report</title>
    <style>body{font-family:Arial,sans-serif;font-size:11px;}
    table{border-collapse:collapse;width:100%;}
    th,td{border:1px solid #ccc;padding:5px 7px;text-align:left;}
    th{background:#f0f0f0;font-weight:700;}.text-end{text-align:right;}
    </style></head><body>
    <h2 style="margin-bottom:6px;">Loan Report</h2>
    <p style="color:#666;margin-bottom:14px;">Generated: ${new Date().toLocaleString("en-IN")}</p>
    ${tbl}</body></html>`);
      win.document.close(); win.print();
    }

    activeFilters = {
      fromDate: el("fFromDate").value || undefined,
      toDate: el("fToDate").value || undefined
    };
    loadDropdowns();
    loadReport(activeFilters);
  </script>
</body>
