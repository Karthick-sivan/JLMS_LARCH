<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JLMS — System Settings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/jlms-core.css">
</head>
<body>
<div class="app-shell">
  <div id="jlmsSidebarMount"></div>
  <div class="main-col">
    <div id="jlmsTopbarMount"></div>
    <div class="page-content">
      <div class="page-header">
        <div>
          <div class="breadcrumb-jlms"><a href="dashboard.html">Home</a><span class="sep">/</span><a href="#">Administration</a><span class="sep">/</span><span class="current">System Settings</span></div>
          <!-- <div class="h1">System Settings</div> -->
        </div>
        <div class="page-actions"><button class="btn-jlms btn-jlms-primary"><i class="bi bi-save"></i> Save Settings</button></div>
      </div>

      <div class="panel">
        <div class="tab-strip">
          <div class="tab-item active">Interest Settings</div>
          <div class="tab-item">Penalty Settings</div>
          <div class="tab-item">Renewal Settings</div>
          <div class="tab-item">Auction Settings</div>
          <div class="tab-item">Notification Settings</div>
          <div class="tab-item">Security Settings</div>
        </div>
        <div class="panel-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="field-label">Default Interest Calculation Method</label>
              <select class="form-select-jlms"><option>Daily Reducing Balance</option><option>Monthly Flat</option><option>Simple Interest</option></select>
            </div>
            <div class="col-md-4">
              <label class="field-label">Interest Rounding</label>
              <select class="form-select-jlms"><option>Round to Nearest ₹1</option><option>Round to Nearest ₹10</option><option>No Rounding</option></select>
            </div>
            <div class="col-md-4">
              <label class="field-label">Grace Period Before Penalty</label>
              <div class="input-affix"><input value="3"><span class="affix suffix">days</span></div>
            </div>
            <div class="col-md-4">
              <label class="field-label">Minimum Interest Charge Period</label>
              <div class="input-affix"><input value="30"><span class="affix suffix">days</span></div>
            </div>
            <div class="col-md-4">
              <label class="field-label">Interest Posting Frequency</label>
              <select class="form-select-jlms"><option>Monthly</option><option>Quarterly</option></select>
            </div>
            <div class="col-md-4">
              <label class="field-label">Allow Partial Interest Payment</label>
              <div class="radio-pill-group" style="margin-top:4px;"><div class="radio-pill selected">Yes</div><div class="radio-pill">No</div></div>
            </div>
          </div>
          <div class="divider-jlms"></div>
          <div class="h4 mb-3">Default Scheme Interest Rates by Tier</div>
          <div class="row g-3">
            <div class="col-md-4"><label class="field-label">0 – 50,000</label><div class="input-affix"><input value="10.0"><span class="affix suffix">%</span></div></div>
            <div class="col-md-4"><label class="field-label">50,001 – 2,00,000</label><div class="input-affix"><input value="12.0"><span class="affix suffix">%</span></div></div>
            <div class="col-md-4"><label class="field-label">Above 2,00,000</label><div class="input-affix"><input value="13.5"><span class="affix suffix">%</span></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script>window.JLMS_ACTIVE = "system-settings";</script>
<script src="js/jlms-shell.js"></script>
<script>jlmsInitShell();</script>
</body>
</html>
