<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JLMS — Loan Scheme Master</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.min.css">
<link rel="stylesheet" href="css/jlms-core.css">
</head>
<body>
<div class="app-shell">
  <div id="jlmsSidebarMount"></div>
  <div class="main-col">
    <div id="jlmsTopbarMount"></div>
    <div class="page-content">
      <div class="page-header">
        <div id="apiErrorBanner" class="api-error-banner"></div>
        <div id="apiSuccessBanner" class="api-success-banner"></div>
        <div>
          <!-- <div class="breadcrumb-jlms"><a href="dashboard.html">Home</a><span class="sep">/</span><a href="#">Masters</a><span class="sep">/</span><span class="current">Loan Scheme Master</span></div> -->
          <div class="h1">Loan Scheme Master</div>
        </div>
      </div>

      <div class="row g-3">
        <div class="col-lg-4">
          <div class="panel">
            <div class="panel-head">
              <div class="h4" id="formTitle">Add Scheme</div>
            </div>
            <div class="panel-body">
              <div class="field-group">
                <label class="field-label">Scheme Name<span class="req">*</span></label>
                <input id="txtSchemeName" class="form-control-jlms" placeholder="e.g. Gold Plus">
              </div>
              <div class="field-group">
                <label class="field-label">Interest Rate (p.a.)<span class="req">*</span></label>
                <div class="input-affix">
                  <input id="txtInterestRate" type="number" step="0.01" min="0" placeholder="e.g. 12.00">
                  <span class="affix suffix">%</span>
                </div>
              </div>
              <div class="field-group">
                <label class="field-label">Tenure</label>
                <div class="input-affix">
                  <input id="txtTenure" type="number" value="12" readonly disabled>
                  <span class="affix suffix">months </span>
                </div>
              </div>
              <div class="field-group">
                <label class="field-label">Max LTV Ratio(Loan Limit %)<span class="req">*</span></label>
                <div class="input-affix">
                  <input id="txtMaxLtv" type="number" step="0.01" min="0" max="100" placeholder="e.g. 75">
                  <span class="affix suffix">%</span>
                </div>
              </div>
              <!-- <div class="field-group">
                <label class="field-label">Processing Fee</label>
                <div class="input-affix">
                  <span class="affix">₹</span>
                  <input id="txtProcessingFee" type="number" step="0.01" min="0" placeholder="e.g. 750">
                </div>
              </div> -->
              <div class="form-check-jlms mb-3">
                <input type="checkbox" id="chkActive" checked>
                <label for="chkActive">Active</label>
              </div>
              <div class="d-flex gap-2">
                <button id="btnClear" class="btn-jlms btn-jlms-ghost" style="flex:1; justify-content:center;">Clear</button>
                <button id="btnSave" class="btn-jlms btn-jlms-primary" style="flex:1; justify-content:center;"><i class="bi bi-save"></i> Save</button>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-8">
          <div class="panel">
            <div class="grid-toolbar">
              <span class="h4">Loan Schemes</span>
              <div class="grid-search"><i class="bi bi-search"></i><input id="txtSearch" placeholder="Search scheme"></div>
            </div>
            <div class="panel-body no-pad table-jlms-wrap">
              <table class="table-jlms">
                <thead><tr><th>Scheme Name</th><th class="text-end">Interest %</th><th class="text-end">Tenure</th><th class="text-end">Max LTV(Loan Limit %)</th>
                  <!-- <th class="text-end">Processing Fee</th> -->
                  <th class="text-center">Status</th><th class="text-center">Action</th></tr></thead>
                <tbody id="tblLoanSchemes"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script>window.JLMS_ACTIVE = "loan-scheme-master";</script>
<script src="js/jlms-shell.js"></script>
<script src="js/api-client.js"></script>
<script>
jlmsInitShell();

const FIXED_TENURE_MONTHS = 12;

let editingId = 0;
let schemeList = [];

document.addEventListener("DOMContentLoaded", () => {

    Session.requireLogin();

    //-------------------------------------------------------
    // Controls
    //-------------------------------------------------------

    const txtSchemeName   = document.getElementById("txtSchemeName");
    const txtInterestRate = document.getElementById("txtInterestRate");
    const txtMaxLtv       = document.getElementById("txtMaxLtv");
    // const txtProcessingFee= document.getElementById("txtProcessingFee");
    const chkActive       = document.getElementById("chkActive");

    const btnSave  = document.getElementById("btnSave");
    const btnClear = document.getElementById("btnClear");

    const tblLoanSchemes   = document.getElementById("tblLoanSchemes");
    const txtSearch        = document.getElementById("txtSearch");
    const apiSuccessBanner = document.getElementById("apiSuccessBanner");

    //-------------------------------------------------------
    // Events
    //-------------------------------------------------------

    btnSave.addEventListener("click", saveLoanScheme);
    btnClear.addEventListener("click", clearForm);

    txtSearch.addEventListener("input", () => {
        const q = txtSearch.value.toLowerCase();
        renderTable(schemeList.filter(s => s.schemeName.toLowerCase().includes(q)));
    });

    loadLoanSchemes();

    //-------------------------------------------------------
    // Load
    //-------------------------------------------------------

    async function loadLoanSchemes() {

        clearApiError();

        try {

            schemeList = await Api.getLoanSchemes(false);

            renderTable(schemeList);

        }
        catch (err) {

            showApiError(err);

        }

    }

    //-------------------------------------------------------
    // Render Table
    //-------------------------------------------------------

    function renderTable(data) {

        tblLoanSchemes.innerHTML = "";

        if (data.length === 0) {

            tblLoanSchemes.innerHTML =
                `<tr>
                    <td colspan="6" class="text-center">
                        No Loan Schemes Found
                    </td>
                </tr>`;

            return;

        }

        data.forEach(item => {

            const badge = item.isActive
                ? `<span class="badge-jlms badge-success"><span class="dot"></span>Active</span>`
                : `<span class="badge-jlms badge-danger"><span class="dot"></span>Inactive</span>`;

            tblLoanSchemes.innerHTML += `
            <tr>
                <td class="cell-strong">${item.schemeName}</td>
                <td class="text-end">${Number(item.interestRatePct).toFixed(2)}%</td>
                <td class="text-end">${item.tenureMonths} mo</td>
                <td class="text-end">${Number(item.maxLtvPercent).toFixed(0)}%</td>
                <td class="text-center">${badge}</td>
                <td class="text-center">
                    <i class="bi bi-pencil edit-icon"
                       data-id="${item.loanSchemeId}"
                       style="cursor:pointer;color:var(--n-500)"></i>
                </td>
            </tr>
            `;

        });

        document.querySelectorAll(".edit-icon").forEach(icon => {

            icon.addEventListener("click", function () {

                editLoanScheme(Number(this.dataset.id));

            });

        });

    }

    //-------------------------------------------------------
    // Save / Update
    //-------------------------------------------------------

    async function saveLoanScheme() {

        clearApiError();

        const dto = {
            schemeName:       txtSchemeName.value.trim(),
            interestRatePct:  parseFloat(txtInterestRate.value),
            tenureMonths:     FIXED_TENURE_MONTHS,
            maxLtvPercent:    parseFloat(txtMaxLtv.value),
            // processingFee:    parseFloat(txtProcessingFee.value) || 0,
            penaltyRatePerDay:0,
            isActive:         chkActive.checked
        };

        if (!dto.schemeName) {
            showApiError(new Error("Please enter Scheme Name."));
            return;
        }

        if (isNaN(dto.interestRatePct)) {
            showApiError(new Error("Please enter Interest Rate."));
            return;
        }

        if (isNaN(dto.maxLtvPercent)) {
            showApiError(new Error("Please enter Max LTV Ratio."));
            return;
        }

        btnSave.disabled = true;

        try {

            if (editingId === 0) {

                await Api.createLoanScheme(dto);

                apiSuccessBanner.innerHTML = "Loan Scheme created successfully.";

            }
            else {

                await Api.updateLoanScheme(editingId, dto);

                apiSuccessBanner.innerHTML = "Loan Scheme updated successfully.";

            }

            apiSuccessBanner.style.display = "block";

            clearForm();

            loadLoanSchemes();

        }
        catch (err) {

            showApiError(err);

        }
        finally {

            btnSave.disabled = false;

        }

    }

    //-------------------------------------------------------
    // Edit
    //-------------------------------------------------------

    function editLoanScheme(id) {

        const item = schemeList.find(x => x.loanSchemeId === id);

        if (!item) return;

        editingId = id;

        document.getElementById("formTitle").textContent = "Edit Scheme";

        txtSchemeName.value    = item.schemeName;
        txtInterestRate.value  = item.interestRatePct;
        txtMaxLtv.value        = item.maxLtvPercent;
        // txtProcessingFee.value = item.processingFee;
        chkActive.checked      = item.isActive;

        btnSave.innerHTML = '<i class="bi bi-check2-circle"></i> Update';

        window.scrollTo({ top: 0, behavior: "smooth" });

    }

    //-------------------------------------------------------
    // Clear
    //-------------------------------------------------------

    function clearForm() {

        editingId = 0;

        document.getElementById("formTitle").textContent = "Add Scheme";

        txtSchemeName.value    = "";
        txtInterestRate.value  = "";
        txtMaxLtv.value        = "";
        // txtProcessingFee.value = "";
        chkActive.checked      = true;

        btnSave.innerHTML = '<i class="bi bi-save"></i> Save';

    }

});
</script>
</body>
</html>
