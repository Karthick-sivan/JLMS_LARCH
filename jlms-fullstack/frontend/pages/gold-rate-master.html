<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JLMS — Gold Rate Master</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="vendor/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="vendor/bootstrap-icons/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/jlms-core.css">
    <script src="vendor/chartjs/chart.umd.js"></script>
</head>
<body>
    <div class="app-shell">
        <div id="jlmsSidebarMount"></div>
        <div class="main-col">
            <div id="jlmsTopbarMount"></div>
            <div class="page-content">
                <div class="page-header">
                    <div>
                        <!-- <div class="breadcrumb-jlms"><a href="dashboard.html">Home</a><span class="sep">/</span><a href="#">Masters</a><span class="sep">/</span><span class="current">Gold Rate Master</span></div> -->
                        <div class="h1">Gold Rate Master</div>
                    </div>
                </div>
                <div id="apiErrorBanner" class="api-error-banner"></div>
                <div id="apiSuccessBanner" class="api-success-banner"></div>


                <div class="row g-3 mb-3">
                    <div class="col-md-6"><div class="kpi-card gold"><div class="kpi-top"><span class="kpi-label">22K Rate Today</span><div class="kpi-icon gold"><i class="bi bi-coin"></i></div></div><div class="kpi-value" id="lbl22K">₹0 / g</div><div class="kpi-foot" id="foot22K"><span class="text-muted-jlms">No previous rate yet</span></div></div></div>
                    <div class="col-md-6"><div class="kpi-card info"><div class="kpi-top"><span class="kpi-label">Silver Rate Today</span><div class="kpi-icon info"><i class="bi bi-gem"></i></div></div><div class="kpi-value" id="lblSilver">₹0 / g</div><div class="kpi-foot" id="footSilver"><span class="text-muted-jlms">No previous rate yet</span></div></div></div>
                </div>

                <div class="row g-3">
                    <div class="col-lg-4">
                        <div class="panel mb-3">
                            <div class="panel-head"><div class="h4">Update Today's Rate</div></div>
                            <div class="panel-body">
                                <div class="field-group"><label class="field-label">Effective Date</label><input class="form-control-jlms" id="effectiveDate" disabled></div>
                                <div class="field-group"><label class="field-label">22K Rate (per gram)<span class="req">*</span></label><div class="input-affix"><span class="affix">₹</span><input id="rate22K"></div></div>
                                <div class="field-group"><label class="field-label">Silver Rate (per gram)<span class="req">*</span></label><div class="input-affix"><span class="affix">₹</span><input id="rateSilver"></div></div>
                                <!-- Hidden fields kept for API payload -->
                                <input type="hidden" id="rate24K">
                                <input type="hidden" id="rate18K">
                                <button id="btnSaveRate" class="btn-jlms btn-jlms-primary" style="width:100%; justify-content:center;"><i class="bi bi-save"></i> Update Rate</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-8">
                        <div class="panel mb-3">
                            <div class="panel-head" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;">
                                <div class="h4">Rate Trend — 22K &amp; Silver (Last 30 Days)</div>
                                <div style="display:flex; gap:16px; align-items:center; font-size:13px;">
                                    <span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#D4AF37;margin-right:5px;"></span>22K Gold</span>
                                    <span><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#7B8EA0;margin-right:5px;"></span>Silver</span>
                                </div>
                            </div>
                            <div class="panel-body"><canvas id="goldRateChart" height="160"></canvas></div>
                        </div>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-head"><div class="h4">Rate History</div></div>
                    <div class="panel-body no-pad table-jlms-wrap">
                        <table class="table-jlms">
                            <thead><tr><th>Effective Date</th><th class="text">22K Rate</th><th class="text">Silver Rate</th></tr></thead>
                            <tbody id="historyBody">
                                <tr><td colspan="3" class="text-muted-jlms">Loading history…</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script>window.JLMS_ACTIVE = "gold-rate-master";</script>
    <script src="js/jlms-shell.js"></script>
    <script src="js/api-client.js"></script>
    <script>

        window.JLMS_ACTIVE = "gold-rate-master";

        jlmsInitShell();

        let goldRateChart = null;
        let historyCache = [];       // most recent history rows, ascending (oldest -> newest)

        const CHART_COLORS = {
            '22K':   { border: '#D4AF37', bg: 'rgba(212,175,55,0.08)' },
            'Silver':{ border: '#7B8EA0', bg: 'rgba(123,142,160,0.08)' }
        };

        document.addEventListener('DOMContentLoaded', async () => {

            Session.requireLogin();

            document.getElementById("effectiveDate").value =
                new Date().toLocaleDateString('en-GB');

            await loadGoldRate();
            await loadHistory();

        });

        function formatCurrency(value) {
            const num = Number(value);
            if (isNaN(num)) return '0.00';
            return num.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatDate(value) {
            if (!value) return '';
            const d = new Date(value);
            if (isNaN(d.getTime())) return value;
            return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        async function loadGoldRate() {

            try {

                const rate = await Api.getTodayGoldRate();

                // Visible fields
                document.getElementById('rate22K').value    = rate.rate22K ?? '';
                document.getElementById('rateSilver').value = rate.silverRate ?? '';

                // Hidden fields (still sent to API)
                document.getElementById('rate24K').value = rate.rate24K ?? '';
                document.getElementById('rate18K').value = rate.rate18K ?? '';

                // KPI tiles
                document.getElementById('lbl22K').innerHTML =
                    '₹' + formatCurrency(rate.rate22K ?? 0) + ' / g';

                document.getElementById('lblSilver').innerHTML =
                    '₹' + formatCurrency(rate.silverRate ?? 0) + ' / g';


                const topGold = document.getElementById('topbarGold22K');
                const topSilver = document.getElementById('topbarSilver');

                if (topGold) {
                    topGold.textContent = rate.rate22K != null 
                        ? '₹' + formatCurrency(rate.rate22K) + '/g' 
                        : '—';
                }
                if (topSilver) {
                    topSilver.textContent = rate.silverRate != null 
                        ? '₹' + formatCurrency(rate.silverRate) + '/g' 
                        : '—';
                }

            }
            catch (err) {
                showApiError(err);
            }
        }

        //function renderTrend(footId, todayVal, prevVal) {

        //    const foot = document.getElementById(footId);
        //    if (todayVal == null || prevVal == null) {
        //        foot.innerHTML = '<span class="text-muted-jlms">No previous rate yet</span>';
        //        return;
        //    }

        //    const diff = Number(todayVal) - Number(prevVal);
        //    const absDiff = Math.abs(diff).toFixed(2);

        //    if (diff > 0) {
        //        foot.innerHTML =
        //            `<span class="kpi-trend-up"><i class="bi bi-arrow-up-short"></i>₹${absDiff}</span>
        //         <span class="text-muted-jlms">vs yesterday</span>`;
        //    } else if (diff < 0) {
        //        foot.innerHTML =
        //            `<span class="kpi-trend-down" style="color:#c0392b;"><i class="bi bi-arrow-down-short"></i>₹${absDiff}</span>
        //         <span class="text-muted-jlms">vs yesterday</span>`;
        //    } else {
        //        foot.innerHTML =
        //            `<span class="text-muted-jlms">No change vs yesterday</span>`;
        //    }
        //}
        function renderTrend(footId, todayVal, prevVal, todayDate, prevDate) {

            const foot = document.getElementById(footId);
            if (todayVal == null || prevVal == null) {
                foot.innerHTML = '<span class="text-muted-jlms">No previous rate yet</span>';
                return;
            }

            const diff = Number(todayVal) - Number(prevVal);
            const absDiff = Math.abs(diff).toFixed(2);

            // Real calendar "today" — NOT the latest history row's date
            const realToday = new Date();
            realToday.setHours(0, 0, 0, 0);

            const dLatest = new Date(todayDate);
            dLatest.setHours(0, 0, 0, 0);

            const dPrev = new Date(prevDate);
            dPrev.setHours(0, 0, 0, 0);

            const updatedToday = (dLatest.getTime() === realToday.getTime());
            const gapFromPrev = Math.round((dLatest - dPrev) / (1000 * 60 * 60 * 24));

            let compareLabel;

            if (updatedToday && gapFromPrev === 1) {
                compareLabel = 'vs yesterday';
            } else if (updatedToday) {
                compareLabel = `vs ${formatDate(prevDate)}`;
            } else {
                // Latest saved rate is not from today — never say "yesterday" here
                compareLabel = `as of ${formatDate(todayDate)}`;
            }

            if (diff > 0) {
                foot.innerHTML =
                    `<span class="kpi-trend-up"><i class="bi bi-arrow-up-short"></i>₹${absDiff}</span>
             <span class="text-muted-jlms">${compareLabel}</span>`;
            } else if (diff < 0) {
                foot.innerHTML =
                    `<span class="kpi-trend-down" style="color:#c0392b;"><i class="bi bi-arrow-down-short"></i>₹${absDiff}</span>
             <span class="text-muted-jlms">${compareLabel}</span>`;
            } else {
                foot.innerHTML =
                    `<span class="text-muted-jlms">No change (${compareLabel})</span>`;
            }
        }
        function renderChart(rowsAscending) {

            const labels     = rowsAscending.map(r => formatDate(r.effectiveDate));
            const data22K    = rowsAscending.map(r => Number(r.rate22K));
            const dataSilver = rowsAscending.map(r => Number(r.silverRate));

            const c22    = CHART_COLORS['22K'];
            const cSilv  = CHART_COLORS['Silver'];

            if (goldRateChart) {
                goldRateChart.data.labels = labels;
                goldRateChart.data.datasets[0].data = data22K;
                goldRateChart.data.datasets[1].data = dataSilver;
                goldRateChart.update();
                return;
            }

            goldRateChart = new Chart(document.getElementById('goldRateChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '22K Gold',
                            data: data22K,
                            borderColor: c22.border,
                            backgroundColor: c22.bg,
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                            borderWidth: 2,
                            yAxisID: 'yGold'
                        },
                        {
                            label: 'Silver',
                            data: dataSilver,
                            borderColor: cSilv.border,
                            backgroundColor: cSilv.bg,
                            fill: true,
                            tension: 0.3,
                            pointRadius: 0,
                            borderWidth: 2,
                            yAxisID: 'ySilver'
                        }
                    ]
                },
                options: {
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => `${ctx.dataset.label}: ₹${ctx.parsed.y.toLocaleString('en-IN', {minimumFractionDigits:2,maximumFractionDigits:2})} / g`
                            }
                        }
                    },
                    scales: {
                        yGold: {
                            type: 'linear',
                            position: 'left',
                            grid: { color: '#EDEFF2' },
                            ticks: { callback: v => '₹' + v.toLocaleString('en-IN') }
                        },
                        ySilver: {
                            type: 'linear',
                            position: 'right',
                            grid: { drawOnChartArea: false },
                            ticks: { callback: v => '₹' + v.toLocaleString('en-IN') }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { display: false }
                        }
                    }
                }
            });
        }

        async function loadHistory() {

            try {

                // API returns rows newest-first (see GoldRatesController.GetHistory)
                const rowsDescending = await Api.getGoldRateHistory(30);

                // Table: newest first, as returned
                let html = '';

                rowsDescending.forEach(r => {

                    html += `
                <tr>
                    <td class="cell-strong">${formatDate(r.effectiveDate)}</td>
                    <td class="text">₹${formatCurrency(r.rate22K)}</td>
                    <td class="text">₹${formatCurrency(r.silverRate)}</td>
                    
                </tr>`;
                });

                document.getElementById('historyBody').innerHTML =
                    html || '<tr><td colspan="3" class="text-muted-jlms">No rate history yet.</td></tr>';

                // Chart wants oldest -> newest for a left-to-right trend line
                const rowsAscending = [...rowsDescending].reverse();
                historyCache = rowsAscending;
                renderChart(rowsAscending);

                // "vs yesterday" trend — 22K and Silver tiles only
                if (rowsDescending.length >= 2) {
                    const today = rowsDescending[0];
                    const prev  = rowsDescending[1];
                    renderTrend('foot22K',   today.rate22K,   prev.rate22K,   today.effectiveDate, prev.effectiveDate);
                    renderTrend('footSilver', today.silverRate, prev.silverRate, today.effectiveDate, prev.effectiveDate);
                } else {
                    renderTrend('foot22K',   null, null);
                    renderTrend('footSilver', null, null);
                }

            }
            catch (err) {
                console.log(err);
                document.getElementById('historyBody').innerHTML =
                    '<tr><td colspan="3" class="text-muted-jlms">Unable to load history.</td></tr>';
            }
        }

        document.addEventListener('click', async function (e) {

            if (e.target.closest('#btnSaveRate')) {

                clearApiError();

                const r22   = parseFloat(document.getElementById('rate22K').value);
                const rSilv = parseFloat(document.getElementById('rateSilver').value);

                if (isNaN(r22) || isNaN(rSilv)) {
                    showApiError({ message: 'Please enter valid numeric rates for 22K and Silver.' });
                    return;
                }

                // Derive 24K and 18K from 22K using standard purity ratios
                const r24 = parseFloat((r22 * 24 / 22).toFixed(2));
                const r18 = parseFloat((r22 * 18 / 22).toFixed(2));

                // Keep hidden fields in sync for reference
                document.getElementById('rate24K').value = r24;
                document.getElementById('rate18K').value = r18;

                try {

                    await Api.setTodayGoldRate({
                        effectiveDate: document.getElementById('effectiveDate').value,
                        rate24K: r24,
                        rate22K: r22,
                        rate18K: r18,
                        silverRate: rSilv
                    });

                    const success =
                        document.getElementById('apiSuccessBanner');

                    success.innerHTML =
                        'Gold &amp; Silver Rate Updated Successfully';

                    success.style.display = 'block';

                    setTimeout(() => { success.style.display = 'none'; }, 3000);

                    await loadGoldRate();
                    await loadHistory();

                }
                catch (err) {

                    showApiError(err);

                }

            }

        });

    </script>
</body>
</html>
